font_family Hurmit Nerd Font Mono
font_size 14.0

hide_window_decorations yes

tab_bar_min_tabs 2
tab_bar_style separator
tab_title_max_length 15
tab_bar_margin_height 0 0

enabled_layouts splits,stack,grid,tall
map ctrl+shift+l launch --location=vsplit --cwd=current
map ctrl+shift+k launch --location=hsplit --cwd=current
map ctrl+shift+space next_layout
map alt+shift+f toggle_layout stack


# BEGIN_KITTY_THEME
# Adwaita dark
include current-theme.conf
# END_KITTY_THEME